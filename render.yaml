services:
  - type: web
    name: tce-compass-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: LLM_API_URL
        value: https://tce-compass-llm.onrender.com/api/chat
    healthCheckPath: /health

  - type: web
    name: tce-compass-llm
    env: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app --log-file -
    envVars:
      - key: GEMINI_API_KEY
        sync: false
